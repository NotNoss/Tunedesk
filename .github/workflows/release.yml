name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: '--bundles appimage,deb'
          - platform: windows-latest
            args: '--bundles nsis'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Tunedesk ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install this version.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Post-process AppImage (strip conflicting system libraries)
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          APPIMAGE_NAME=$(basename "$APPIMAGE")
          APPIMAGE_DIR=$(dirname "$APPIMAGE")

          # Extract and remove libs that conflict with system Wayland/EGL/GL stack
          chmod +x "$APPIMAGE"
          "$APPIMAGE" --appimage-extract
          find squashfs-root/usr/lib -name "libwayland-*"   -delete 2>/dev/null || true
          find squashfs-root/usr/lib -name "libEGL*"        -delete 2>/dev/null || true
          find squashfs-root/usr/lib -name "libGL*"         -delete 2>/dev/null || true
          find squashfs-root/usr/lib -name "libGLdispatch*" -delete 2>/dev/null || true
          find squashfs-root/usr/lib -name "libGLESv2*"     -delete 2>/dev/null || true

          # Repackage
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool squashfs-root "$APPIMAGE"
          rm -rf squashfs-root appimagetool

          # Sign the modified AppImage directly (URL in latest.json points to raw AppImage)
          pnpm tauri signer sign \
            -k "$TAURI_SIGNING_PRIVATE_KEY" \
            -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            "$APPIMAGE"
          APPIMAGE_SIG=$(cat "${APPIMAGE}.sig")

          # Replace the published AppImage with the fixed version
          gh release upload "${{ github.ref_name }}" "$APPIMAGE" --clobber

          # Update both AppImage platform entries in latest.json with the new signature
          gh release download "${{ github.ref_name }}" -p "latest.json" -D /tmp/
          jq --arg sig "$APPIMAGE_SIG" '
            .platforms["linux-x86_64"].signature = $sig |
            .platforms["linux-x86_64-appimage"].signature = $sig
          ' /tmp/latest.json > /tmp/latest.json.new
          mv /tmp/latest.json.new /tmp/latest.json
          gh release upload "${{ github.ref_name }}" /tmp/latest.json --clobber

      - name: Post-process deb (remove bundled mpv to avoid system package conflict)
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEB=$(find src-tauri/target/release/bundle/deb -name "*.deb" | head -1)
          mkdir -p /tmp/deb-repack
          dpkg-deb -R "$DEB" /tmp/deb-repack/
          rm -f /tmp/deb-repack/usr/bin/mpv
          dpkg-deb -b /tmp/deb-repack/ "$DEB"
          rm -rf /tmp/deb-repack/
          gh release upload "${{ github.ref_name }}" "$DEB" --clobber
